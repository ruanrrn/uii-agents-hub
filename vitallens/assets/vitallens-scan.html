<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>VitalLens — 心率与呼吸率单次测量</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
        max-width: 720px;
        margin: 1.5em auto;
        padding: 0 1em;
        color: #222;
      }
      h1 {
        font-size: 1.4em;
        margin: 0 0 0.3em;
      }
      .lead {
        color: #555;
        margin-top: 0;
        font-size: 0.95em;
      }
      #preview {
        width: 100%;
        max-width: 640px;
        aspect-ratio: 4/3;
        background: #111;
        border-radius: 8px;
        display: block;
        margin: 1em 0;
      }
      #status {
        font-size: 1em;
        margin: 0.8em 0;
        min-height: 1.4em;
        color: #444;
      }
      .controls {
        display: flex;
        gap: 0.6em;
        flex-wrap: wrap;
        margin: 0.5em 0;
      }
      button {
        font-size: 1em;
        padding: 0.55em 1.1em;
        cursor: pointer;
        border: none;
        border-radius: 4px;
        font-family: inherit;
      }
      .primary {
        background: #2080ff;
        color: white;
      }
      .primary:hover:not(:disabled) {
        background: #1668d8;
      }
      .secondary {
        background: #ececec;
        color: #222;
      }
      .secondary:hover:not(:disabled) {
        background: #dcdcdc;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      #results {
        background: #f7f7f8;
        border-radius: 8px;
        padding: 0.8em 1em;
        margin-top: 1em;
        display: none;
      }
      #results h2 {
        margin: 0 0 0.5em;
        font-size: 1.15em;
      }
      .metric {
        display: flex;
        justify-content: space-between;
        padding: 0.35em 0;
        border-bottom: 1px solid #e0e0e0;
      }
      .metric:last-child {
        border-bottom: 0;
      }
      .metric .v {
        font-variant-numeric: tabular-nums;
      }
      .lo {
        color: #c66;
      }
      .disclaimer {
        color: #888;
        font-size: 0.85em;
        margin-top: 1.5em;
        padding-top: 0.8em;
        border-top: 1px solid #eee;
      }
      .key-prompt {
        background: #fff8dc;
        padding: 0.6em 1em;
        border-radius: 6px;
        margin: 0.5em 0;
        font-size: 0.9em;
        display: none;
      }
      .key-prompt input {
        width: 70%;
        padding: 0.3em;
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <h1>心率与呼吸率单次测量</h1>
    <p class="lead">
      请将面部对准摄像头中央，保持不动；按"开始测量"会进行 3 秒倒计时，然后采集
      ≥350 帧（约 12–20 秒）。
    </p>

    <div id="keyPrompt" class="key-prompt">
      页面未通过启动脚本打开，未自动注入 API key。请粘贴你的 VitalLens API key
      （免费申请：<a href="https://www.rouast.com/api" target="_blank"
        >https://www.rouast.com/api</a
      >）： <br /><input id="apiKeyInput" placeholder="VITALLENS_API_KEY..." />
      <button id="setKeyBtn" class="secondary">使用此 key</button>
    </div>

    <video id="preview" autoplay muted playsinline></video>
    <div id="status">点击下方按钮开始</div>
    <div class="controls">
      <button id="startBtn" class="primary" disabled>加载中…</button>
      <button id="downloadBtn" class="secondary" disabled>下载结果 JSON</button>
    </div>

    <div id="results">
      <h2>测量结果</h2>
      <div id="metricsBox"></div>
    </div>

    <p class="disclaimer">
      ⚠ 仅供研究用途，不构成医疗建议。Research use only — not for medical
      decisions.
    </p>

    <script type="module">
      import { VitalLens } from "./vitallens.browser.js";
      import {
        patchWebmDuration,
        patchWebmDefaultDuration,
      } from "./webm-duration-fix.js";

      // -------- Config --------
      // API key comes from URL hash (#key=ABC). The launcher injects it there
      // because hashes don't appear in server access logs or the Referer header.
      let API_KEY =
        new URLSearchParams(location.hash.slice(1)).get("key") || "";
      const TARGET_FRAMES = 350; // collect at least this many camera frames
      const MAX_WAIT_MS = 60000; // safety cap: stop after this much wall time anyway
      const CONFIDENCE_WARN = 0.7;
      const AUTO_START = true; // start measurement automatically when ready
      const AUTO_CLOSE_DELAY_MS = 2500; // ms to show result before window.close()

      // -------- DOM --------
      const preview = document.getElementById("preview");
      const statusEl = document.getElementById("status");
      const startBtn = document.getElementById("startBtn");
      const downloadBtn = document.getElementById("downloadBtn");
      const resultsBox = document.getElementById("results");
      const metricsBox = document.getElementById("metricsBox");
      const keyPrompt = document.getElementById("keyPrompt");
      const apiKeyInput = document.getElementById("apiKeyInput");
      const setKeyBtn = document.getElementById("setKeyBtn");

      let result = null,
        vl = null,
        stream = null;

      const REC_FPS = 30;

      // The stream fed to MediaRecorder — always the raw camera stream.
      // The launcher forces DPR=1 (--force-device-scale-factor=1) so that
      // the VP8 encoder won't apply DPR scaling to encoded frames.
      let recStream = null;

      async function openCamera() {
        // Force 1280×720: height must be 16-byte aligned for VP8. The camera's
        // native 1920×1080 (1080/16=67.5) causes the VP8 encoder to pad rows
        // to 1088 internally; the decoder strips them back to 1080, producing a
        // 4800-byte buffer mismatch in ffmpeg.wasm. 720/16=45 — clean.
        const rawStream = await navigator.mediaDevices.getUserMedia({
          video: {
            width: { ideal: 1280 },
            height: { ideal: 720 },
            frameRate: { ideal: REC_FPS },
          },
          audio: false,
        });

        stream = rawStream;
        recStream = rawStream;
        preview.srcObject = rawStream;
        await preview.play();

        const s = rawStream.getVideoTracks()[0].getSettings();
        window._frameDiag = `raw:${s.width}×${s.height}@${s.frameRate}fps`;
        console.log("[vitallens] Camera:", window._frameDiag);
      }

      // Report errors back to the launcher (if any). Returns silently if no server
      // is listening — the page also works when opened directly.
      function reportError(err) {
        const body = (err && err.stack) || (err && err.message) || String(err);
        return fetch("/save?name=error.txt", { method: "POST", body }).catch(
          () => {},
        );
      }

      // Core recording + analysis logic.
      async function recordAndAnalyze() {
        for (let n = 3; n > 0; n--) {
          statusEl.textContent = `准备开始：${n}`;
          await new Promise((r) => setTimeout(r, 1000));
        }

        // Record from recStream. Prefer VP8 — the launcher forces DPR=1 via
        // --force-device-scale-factor=1, which eliminates the VP8 DPR-scaling
        // bug. VP9 encoding in Edge produces dimension mismatches in ffmpeg.wasm.
        const mime =
          ["video/webm;codecs=vp8", "video/webm"].find((m) =>
            MediaRecorder.isTypeSupported(m),
          ) || "";
        const recorder = new MediaRecorder(
          recStream,
          mime ? { mimeType: mime } : {},
        );
        const chunks = [];
        recorder.addEventListener("dataavailable", (e) => {
          if (e.data && e.data.size) chunks.push(e.data);
        });
        const stopped = new Promise((r) =>
          recorder.addEventListener("stop", r),
        );

        // Determine actual camera fps from track settings. rVFC is unreliable
        // with virtual cameras (OBS Virtual Camera triggers it at ~1 Hz even
        // when the actual video feed is 30+ fps). Use time-based recording
        // with the track-reported fps instead.
        const camTrack = stream.getVideoTracks()[0];
        const camSettings = camTrack.getSettings();
        const actualFps = camSettings.frameRate || REC_FPS;
        const targetDurationMs =
          Math.ceil((TARGET_FRAMES / actualFps) * 1000) + 500;

        const startedAt = performance.now();
        recorder.start(200);

        while (true) {
          const elapsed = performance.now() - startedAt;
          if (elapsed >= targetDurationMs || elapsed >= MAX_WAIT_MS) break;
          const elapsedSec = (elapsed / 1000).toFixed(1);
          const estFrames = Math.floor((elapsed / 1000) * actualFps);
          statusEl.textContent = `录制中：保持不动，正常呼吸 —— ~${estFrames} 帧 / 目标 ${TARGET_FRAMES}（${elapsedSec}s）`;
          await new Promise((r) => setTimeout(r, 250));
        }

        const captureMs = performance.now() - startedAt;
        recorder.stop();
        await stopped;
        const rawBlob = new Blob(chunks, {
          type: recorder.mimeType || "video/webm",
        });

        // Use the track-reported fps for metadata patching (more reliable
        // than counting frames via rVFC, especially with virtual cameras).
        const recordedFrames = Math.round((captureMs / 1000) * actualFps);

        // Patch the WebM blob with TWO missing pieces of metadata that
        // MediaRecorder omits and ffmpeg.wasm needs:
        //   (1) Duration in Info section          → ffmpeg "Duration: HH:MM:SS.ms"
        //   (2) DefaultDuration in Video TrackEntry → ffmpeg "NN fps"
        statusEl.textContent = "修正 WebM 容器元数据…";
        const fpsValue = actualFps;
        let fixedBlob;
        try {
          let b = await patchWebmDuration(rawBlob, captureMs);
          b = await patchWebmDefaultDuration(b, fpsValue);
          fixedBlob = b;
        } catch (e) {
          const diagMsg = `WebM patch failed: ${e.message}\nBlob size: ${rawBlob.size}, type: ${rawBlob.type}, fps: ${fpsValue.toFixed(2)}, duration: ${captureMs.toFixed(0)}ms`;
          throw new Error(diagMsg);
        }
        const file = new File([fixedBlob], "capture.webm", {
          type: fixedBlob.type,
        });

        statusEl.textContent = "上传至 VitalLens API 分析中（约 10–30 秒）…";
        const apiResult = await vl.processVideoFile(file);

        apiResult.capture_meta = {
          camera_w: stream.getVideoTracks()[0].getSettings().width,
          camera_h: stream.getVideoTracks()[0].getSettings().height,
          frames: recordedFrames,
          elapsed_ms: Math.round(captureMs),
          target_frames: TARGET_FRAMES,
          mime: fixedBlob.type,
          blob_size: fixedBlob.size,
        };
        return apiResult;
      }

      async function measure() {
        startBtn.disabled = true;
        downloadBtn.disabled = true;
        resultsBox.style.display = "none";
        result = null;
        try {
          if (!vl) {
            statusEl.textContent = "初始化 VitalLens 实例…";
            vl = new VitalLens({ method: "vitallens", apiKey: API_KEY });
          }

          if (!stream) {
            statusEl.textContent = "打开摄像头…";
            await openCamera();
          }

          result = await recordAndAnalyze();

          // POST result to the local launcher. Browser auto-downloads can be
          // blocked in --app mode, so the launcher uses this as the canonical
          // output channel; fails silently when the page is opened standalone.
          await fetch("/save?name=result.json", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(result, null, 2),
          }).catch(() => {});

          showResults(result);
          downloadBtn.disabled = false;
          triggerDownload(result);

          statusEl.textContent = "测量完成。窗口将在几秒后自动关闭…";
          setTimeout(() => {
            try {
              window.close();
            } catch (e) {
              /* ignored */
            }
            setTimeout(() => {
              statusEl.textContent = "测量完成。可手动关闭此窗口。";
            }, 800);
          }, AUTO_CLOSE_DELAY_MS);
        } catch (err) {
          console.error(err);
          const camTrack = stream && stream.getVideoTracks()[0];
          const camS = camTrack && camTrack.getSettings();
          const diag = [
            camS ? `camera:${camS.width}×${camS.height}` : "",
            window._frameDiag || "",
          ]
            .filter(Boolean)
            .join(" | ");
          statusEl.textContent = `错误：${(err && err.message) || err}`;
          await reportError(
            (err.stack || err.message || String(err)) + `\n[${diag}]`,
          );
        } finally {
          startBtn.disabled = false;
          startBtn.textContent = "重新测量";
        }
      }

      function getVital(r, name) {
        return (
          (r && r.vitals && r.vitals[name]) ||
          (r && r[name]) ||
          (r &&
            r.results &&
            r.results[0] &&
            r.results[0].vitals &&
            r.results[0].vitals[name])
        );
      }

      function showResults(r) {
        statusEl.textContent = "测量完成。";
        resultsBox.style.display = "block";
        const hr = getVital(r, "heart_rate");
        const rr = getVital(r, "respiratory_rate");
        const rows = [];
        const fmt = (m, unit, label) => {
          if (!m || typeof m.value !== "number") return;
          const c = m.confidence != null ? m.confidence : 0;
          const lo = c < CONFIDENCE_WARN ? " lo" : "";
          rows.push(
            `<div class="metric"><b>${label}</b>` +
              `<span class="v${lo}">${m.value.toFixed(1)} ${unit}  ` +
              `(置信度 ${c.toFixed(2)}${c < CONFIDENCE_WARN ? " ⚠ 偏低" : ""})</span></div>`,
          );
        };
        fmt(hr, "bpm", "心率 Heart Rate");
        fmt(rr, "rpm", "呼吸率 Respiratory Rate");
        if (!rows.length) {
          rows.push(
            '<div class="metric">未在返回中找到心率/呼吸率字段，请查看 result.json 全文。</div>',
          );
        }
        metricsBox.innerHTML = rows.join("");
      }

      function triggerDownload(r) {
        const blob = new Blob([JSON.stringify(r, null, 2)], {
          type: "application/json",
        });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "vitallens_result.json";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(a.href);
      }

      downloadBtn.addEventListener(
        "click",
        () => result && triggerDownload(result),
      );
      startBtn.addEventListener("click", measure);
      setKeyBtn.addEventListener("click", () => {
        const v = apiKeyInput.value.trim();
        if (v) {
          API_KEY = v;
          keyPrompt.style.display = "none";
          checkReady();
        }
      });

      function checkReady() {
        if (!API_KEY) {
          keyPrompt.style.display = "block";
          statusEl.textContent = "等待 API key…";
          startBtn.textContent = "等待 API key";
          startBtn.disabled = true;
        } else {
          keyPrompt.style.display = "none";
          startBtn.textContent = "开始测量";
          startBtn.disabled = false;
          if (AUTO_START) {
            statusEl.textContent =
              "准备就绪，即将自动开始测量（将请求摄像头权限）…";
            setTimeout(() => measure(), 600);
          } else {
            statusEl.textContent = '准备就绪。点击"开始测量"。';
          }
        }
      }
      checkReady();
    </script>
  </body>
</html>
